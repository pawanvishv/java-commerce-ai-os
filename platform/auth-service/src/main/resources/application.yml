spring:
  autoconfigure:
    exclude:
      - com.commerceos.tenant.context.TenantContextAutoConfiguration
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: commerce
    password: commerce
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: commerce
      timeout: 2000ms

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

auth:
  jwt:
    issuer: https://auth.commerce.local
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 7
    jwks-key-id: commerce-os-key-1

logging:
  level:
    com.commerceos: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
