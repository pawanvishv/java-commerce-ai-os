spring:
  application:
    name: notification-service

  autoconfigure:
    exclude:
      - com.commerceos.tenant.context.TenantContextAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: commerce
    password: commerce
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: commerce
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.commerceos.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: "java.util.Map"

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    test-connection: false
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/.well-known/jwks.json

server:
  port: 8084

management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

notification:
  email:
    from: noreply@commerce.local
  channels:
    email-enabled: false
    sms-enabled: false

logging:
  level:
    com.commerceos: DEBUG
