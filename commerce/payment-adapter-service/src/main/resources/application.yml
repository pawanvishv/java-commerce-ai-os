spring:
  application:
    name: payment-adapter-service

  autoconfigure:
    exclude:
      - com.commerceos.tenant.context.TenantContextAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/payment_adapter_db
    username: commerce
    password: commerce
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: commerce
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

payment:
  gateways:
    razorpay:
      enabled: true

logging:
  level:
    com.commerceos: DEBUG
