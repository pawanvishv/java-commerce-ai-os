spring:
  application:
    name: tax-calculation-service

  autoconfigure:
    exclude:
      - com.commerceos.tenant.context.TenantContextAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/tax_db
    username: commerce
    password: commerce
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=86400s

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/.well-known/jwks.json

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.commerceos: DEBUG
