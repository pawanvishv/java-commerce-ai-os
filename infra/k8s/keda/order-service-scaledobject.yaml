apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-service-scaledobject
  namespace: commerce
spec:
  scaleTargetRef:
    name: order-service
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: order-service
        topic: order.created.v1
        lagThreshold: "5"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ledger-service-scaledobject
  namespace: commerce
spec:
  scaleTargetRef:
    name: ledger-service
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: ledger-service
        topic: payment.captured.v1
        lagThreshold: "10"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inventory-service-scaledobject
  namespace: commerce
spec:
  scaleTargetRef:
    name: inventory-service
  minReplicaCount: 1
  maxReplicaCount: 8
